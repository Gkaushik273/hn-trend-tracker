name: Scrape HN

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python main.py

      - run: |
          git config user.name "hn-tracker-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/hn_snapshots.csv
          git commit -m "Automated scrape $(date -u)" || echo "No changes to commit"
          git push